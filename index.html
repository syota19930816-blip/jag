<!doctype html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/><title>Funky Reference Slot</title><link rel="stylesheet" href="style.css"/></head><body>
<main class="machine">
<header class="top"><div class="badge">FUNKY</div><h1>PEKA SLOT 2</h1><div class="badge">6 SETTINGS</div></header>
<section class="setting-box"><label for="settingSelect">設定</label><select id="settingSelect"><option value="1">設定1</option><option value="2">設定2</option><option value="3">設定3</option><option value="4">設定4</option><option value="5">設定5</option><option value="6">設定6</option></select><span id="oddsText">BIG 1/266.4　REG 1/439.8</span></section>
<section class="counter"><div><span>CREDIT</span><strong id="credit">50</strong></div><div><span>BET</span><strong id="bet">0</strong></div><div><span>GAME</span><strong id="game">0</strong></div><div><span>差枚</span><strong id="medals">0</strong></div></section>
<section class="history"><div><span>BIG</span><strong id="bigCount">0</strong></div><div><span>REG</span><strong id="regCount">0</strong></div><div><span>合算</span><strong id="bonusRate">-</strong></div><div><span>現在G</span><strong id="sinceBonus">0</strong></div></section>
<section class="history"><div><span>ぶどう</span><strong id="grapeCount">0</strong></div><div><span>ぶどう率</span><strong id="grapeRate">-</strong></div><div><span>AUTO</span><strong id="autoCount">0</strong></div><div><span>PAY</span><strong id="lastPay">0</strong></div></section>
<section class="main-panel"><div id="lamp" class="lamp"><span>GOGO!</span></div><div class="reels"><div class="reel" id="reel0">🍒</div><div class="reel" id="reel1">🔔</div><div class="reel" id="reel2">7️⃣</div></div>
<div class="stops"><button id="stop0" disabled>STOP</button><button id="stop1" disabled>STOP</button><button id="stop2" disabled>STOP</button></div>
<div class="controls"><button id="maxBetBtn">MAX BET</button><button id="spinBtn">レバー</button><button id="autoBtn">光るまでAUTO</button></div>
<div class="sub-controls"><button id="betBtn">1 BET</button><button id="soundBtn">SOUND ON</button><button id="resetBtn">RESET</button></div><p id="message">設定を選んでMAX BET → レバー。</p></section>
<section class="paytable"><h2>配当・仕様</h2><p>7️⃣7️⃣7️⃣：BIG 252枚 / 🤡🤡🤡：REG 96枚</p><p>🍇🍇🍇：8枚 / 🔔🔔🔔：10枚 / 🍒：2枚</p><p>先ペカ25%・後ペカ75%。後ペカ時の一部でガコッ風音。</p><p class="note">※非公式の参考風アプリです。公式素材・実機名画像は使用していません。</p></section>
</main><script src="app.js"></script></body></html>
